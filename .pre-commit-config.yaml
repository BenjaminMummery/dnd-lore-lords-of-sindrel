repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: mixed-line-ending
        args: [--fix=lf]
        files: \.textile$
      - id: end-of-file-fixer
        files: \.textile$
      - id: trailing-whitespace
        files: \.textile$
  - repo: local
    hooks:
      - id: generate-lore-dashboard
        name: generate lore dashboard
        entry: python3 scripts/generate_lore_dashboard.py
        language: system
        files: ^lore/
        pass_filenames: false
